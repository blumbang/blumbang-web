name: Build Sparks Pages

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest
        run: git pull origin main

      - name: Run build-sparks
        run: node build-sparks.js

      - name: Commit dan push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sparks/
          git diff --staged --quiet && echo "Tidak ada perubahan" && exit 0
          git commit -m "chore: rebuild sparks kota [skip ci]"
          git push origin main
