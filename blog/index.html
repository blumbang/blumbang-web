<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · Blumbang.id</title>
<meta name="description" content="Cerita, perjalanan, dan behind the scene dari Blumbang.id — independent t-shirt studio di Klaten.">
<link rel="canonical" href="https://blumbang.id/blog">
<meta property="og:type" content="website">
<meta property="og:url" content="https://blumbang.id/blog">
<meta property="og:title" content="Blog · Blumbang.id">
<meta property="og:description" content="Cerita, perjalanan, dan behind the scene dari Blumbang.id.">
<meta property="og:image" content="https://blumbang.id/og-image.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-39SRRM5GKK");</script>
<style>
:root{
  --black:#080808;--charcoal:#141414;--grey:#1e1e1e;--border:#2a2a2a;
  --muted:#666;--dim:#888;--light:#ccc;--white:#F5F0E8;
  --gold:#C9A84C;--gold-dim:#7a6028;--gold-bg:#140f02;
  --font-logo:'Bebas Neue',sans-serif;
  --font-body:'Montserrat',sans-serif;
  --font-ui:'Inter',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(8,8,8,0.98);border-bottom:1px solid var(--border);}
.nav-brand{font-family:var(--font-logo);font-size:1.6rem;letter-spacing:0.15em;color:var(--gold);text-decoration:none;}
.nav-links{display:flex;gap:32px;}
.nav-links a{font-family:var(--font-ui);font-size:0.75rem;font-weight:500;letter-spacing:0.12em;color:var(--light);text-decoration:none;transition:color 0.2s;text-transform:uppercase;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}
.nav-order{font-family:var(--font-ui);font-size:0.72rem;font-weight:700;letter-spacing:0.2em;color:var(--black);background:var(--gold);padding:9px 20px;text-decoration:none;transition:all 0.2s;text-transform:uppercase;}
.nav-order:hover{background:var(--white);}
.nav-hamburger{display:none;background:none;border:none;color:var(--gold);font-size:1.4rem;cursor:pointer;}
.nav-mobile{display:none;position:fixed;top:61px;left:0;right:0;background:var(--charcoal);border-bottom:1px solid var(--border);z-index:99;flex-direction:column;padding:20px;}
.nav-mobile.open{display:flex;}
.nav-mobile a{font-family:var(--font-ui);font-size:0.85rem;font-weight:500;letter-spacing:0.12em;color:var(--light);text-decoration:none;padding:12px 0;border-bottom:1px solid var(--border);text-transform:uppercase;}
.nav-mobile a:last-child{border-bottom:none;}
.mobile-order{color:var(--gold)!important;font-weight:700!important;}
.page{padding-top:61px;}
.blog-hero{padding:64px 40px 40px;border-bottom:1px solid var(--border);text-align:center;}
.blog-tag{font-family:var(--font-ui);font-size:0.68rem;font-weight:600;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;display:block;}
.blog-title{font-family:var(--font-logo);font-size:clamp(3rem,7vw,6rem);letter-spacing:0.06em;line-height:1;margin-bottom:12px;}
.blog-sub{font-family:var(--font-body);font-size:0.95rem;font-weight:300;color:var(--dim);letter-spacing:0.02em;}
.filter-bar{display:flex;gap:8px;padding:24px 40px;border-bottom:1px solid var(--border);overflow-x:auto;}
.filter-btn{font-family:var(--font-ui);font-size:0.68rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:7px 16px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.filter-btn:hover,.filter-btn.active{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-bg);}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:var(--border);}
.blog-wrap{background:var(--black);padding:40px;}
.blog-card{background:var(--charcoal);border:1px solid var(--border);display:flex;flex-direction:column;transition:border-color 0.2s;text-decoration:none;color:inherit;}
.blog-card:hover{border-color:var(--gold-dim);}
.blog-card:hover .card-title{color:var(--gold);}
.card-img{width:100%;aspect-ratio:3/2;object-fit:cover;object-position:center top;display:block;filter:grayscale(20%);}
.card-img-placeholder{width:100%;aspect-ratio:3/2;background:var(--grey);display:flex;align-items:center;justify-content:center;}
.card-img-placeholder span{font-family:var(--font-logo);font-size:2rem;color:var(--muted);}
.card-body{padding:24px;}
.card-meta{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.card-cat{font-family:var(--font-ui);font-size:0.6rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);padding:2px 8px;border:1px solid var(--gold-dim);background:var(--gold-bg);}
.card-date{font-family:var(--font-ui);font-size:0.65rem;color:var(--muted);}
.card-title{font-family:var(--font-logo);font-size:1.5rem;letter-spacing:0.04em;line-height:1.2;margin-bottom:10px;transition:color 0.2s;}
.card-desc{font-family:var(--font-body);font-size:0.82rem;font-weight:300;color:var(--dim);line-height:1.7;}
.card-footer{padding:16px 24px;border-top:1px solid var(--border);}
.card-read{font-family:var(--font-ui);font-size:0.65rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);}
.blog-empty{padding:80px 40px;text-align:center;}
.empty-icon{font-family:var(--font-logo);font-size:3rem;color:var(--muted);margin-bottom:16px;}
.empty-text{font-family:var(--font-body);font-size:0.9rem;color:var(--dim);}
.loading-wrap{padding:80px 40px;text-align:center;}
.loading-dot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blink 1.2s infinite;}
.loading-dot:nth-child(2){animation-delay:0.2s;}
.loading-dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
footer{border-top:1px solid var(--border);padding:32px 40px;}
.footer-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.footer-brand{font-family:var(--font-logo);font-size:1.2rem;letter-spacing:0.2em;color:var(--gold);}
.footer-links{display:flex;gap:24px;}
.footer-links a{font-family:var(--font-ui);font-size:0.68rem;font-weight:500;letter-spacing:0.15em;color:var(--light);text-decoration:none;transition:color 0.2s;text-transform:uppercase;}
.footer-links a:hover{color:var(--gold);}
.footer-copy{font-family:var(--font-ui);font-size:0.68rem;letter-spacing:0.1em;color:var(--muted);}
@media(max-width:768px){
  nav{padding:14px 18px;}
  .nav-links,.nav-order{display:none;}
  .nav-hamburger{display:block;}
  .blog-hero{padding:48px 20px 32px;}
  .filter-bar{padding:16px 20px;}
  .blog-wrap{padding:20px;}
  .blog-grid{grid-template-columns:1fr;}
  footer{padding:24px 20px;}
  .footer-inner{flex-direction:column;text-align:center;}
  .footer-links{justify-content:center;}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">BLUMB✦NG</a>
  <div class="nav-links">
    <a href="/catalog">Koleksi</a>
    <a href="/sparks">Perjalanan</a>
    <a href="/blog" class="active">Blog</a>
    <a href="/about">Tentang</a>
  </div>
  <a href="https://wa.me/6281234561146" class="nav-order">✦ Order</a>
  <button class="nav-hamburger" onclick="toggleMenu()" id="hamburger">☰</button>
</nav>
<div class="nav-mobile" id="nav-mobile">
  <a href="/catalog" onclick="toggleMenu()">Koleksi</a>
  <a href="/sparks" onclick="toggleMenu()">Perjalanan</a>
  <a href="/blog" onclick="toggleMenu()">Blog</a>
  <a href="/about" onclick="toggleMenu()">Tentang</a>
  <a href="https://wa.me/6281234561146" class="mobile-order" onclick="toggleMenu()">✦ Order Sekarang</a>
</div>
<div class="page">
  <div class="blog-hero">
    <span class="blog-tag">Blumbang · Studio</span>
    <h1 class="blog-title">CERITA & CATATAN</h1>
    <p class="blog-sub">Behind the scene, perjalanan kaos, dan segala yang terjadi di Jeto, Klaten.</p>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterPosts('semua',this)">Semua</button>
    <button class="filter-btn" onclick="filterPosts('cerita',this)">Cerita</button>
    <button class="filter-btn" onclick="filterPosts('produk',this)">Produk</button>
    <button class="filter-btn" onclick="filterPosts('bts',this)">Behind the Scene</button>
    <button class="filter-btn" onclick="filterPosts('perjalanan',this)">Perjalanan Kaos</button>
  </div>
  <div class="blog-wrap">
    <div id="blog-container">
      <div class="loading-wrap">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  </div>
</div>
<footer>
  <div class="footer-inner">
    <div class="footer-brand">BLUMB✦NG</div>
    <div class="footer-links">
      <a href="/catalog">Koleksi</a>
      <a href="/sparks">Perjalanan</a>
      <a href="/about">Tentang</a>
      <a href="https://wa.me/6281234561146">WhatsApp</a>
    </div>
    <div class="footer-copy">© 2026 Blumbang · Jeto, Klaten</div>
  </div>
</footer>
<script>
const catLabel = {cerita:'Cerita',produk:'Produk',bts:'Behind the Scene',perjalanan:'Perjalanan Kaos'};
let allPosts = [];
let currentFilter = 'semua';

async function loadPosts() {
  try {
    const res = await fetch('/blog/posts.json');
    if (!res.ok) throw new Error();
    allPosts = await res.json();
    allPosts = allPosts.filter(p => p.published !== false);
    allPosts.sort((a,b) => new Date(b.date) - new Date(a.date));
    renderPosts(allPosts);
  } catch(e) { renderEmpty(); }
}

function renderPosts(posts) {
  const container = document.getElementById('blog-container');
  if (!posts.length) { renderEmpty(); return; }
  container.innerHTML = `<div class="blog-grid">` +
    posts.map(p => {
      const img = p.cover
        ? `<img class="card-img" src="${p.cover}" alt="${p.title}" loading="lazy">`
        : `<div class="card-img-placeholder"><span>✦</span></div>`;
      const date = p.date ? new Date(p.date).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}) : '';
      const cat = catLabel[p.category] || p.category || '';
      return `<a class="blog-card" href="/blog/${p.slug}">
        ${img}
        <div class="card-body">
          <div class="card-meta">
            ${cat ? `<span class="card-cat">${cat}</span>` : ''}
            ${date ? `<span class="card-date">${date}</span>` : ''}
          </div>
          <div class="card-title">${p.title}</div>
          ${p.description ? `<div class="card-desc">${p.description}</div>` : ''}
        </div>
        <div class="card-footer"><span class="card-read">Baca Selengkapnya →</span></div>
      </a>`;
    }).join('') + `</div>`;
}

function renderEmpty() {
  document.getElementById('blog-container').innerHTML = `
    <div class="blog-empty">
      <div class="empty-icon">✦</div>
      <div class="empty-text">Belum ada artikel${currentFilter !== 'semua' ? ' di kategori ini' : ''}.<br>Segera hadir.</div>
    </div>`;
}

function filterPosts(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'semua' ? allPosts : allPosts.filter(p => p.category === cat);
  renderPosts(filtered);
}

function toggleMenu() {
  const m = document.getElementById('nav-mobile');
  const h = document.getElementById('hamburger');
  m.classList.toggle('open');
  h.textContent = m.classList.contains('open') ? '✕' : '☰';
}

loadPosts();
</script>
</body>
</html>
