backend:
  name: github
  repo: blumbang/blumbang-web
  branch: main
  base_url: https://blumbang.id
  auth_endpoint: api/auth

media_folder: ""
public_folder: "https://media.blumbang.id"

locale: id

collections:
  - name: "blog"
    label: "Blog & Cerita"
    label_singular: "Artikel"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/{{slug}}"
    fields:
      - label: "Judul"
        name: "title"
        widget: "string"
        hint: "Judul artikel — akan muncul di Google"

      - label: "Tanggal"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"

      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - { label: "Cerita", value: "cerita" }
          - { label: "Produk", value: "produk" }
          - { label: "Behind the Scene", value: "bts" }
          - { label: "Perjalanan Kaos", value: "perjalanan" }

      - label: "Deskripsi Singkat"
        name: "description"
        widget: "text"
        hint: "Maksimal 160 karakter — muncul di Google"

      - label: "Konten"
        name: "body"
        widget: "markdown"

      - label: "Publish"
        name: "published"
        widget: "boolean"
        default: true
