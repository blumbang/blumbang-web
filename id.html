<style>
:root{
  --black:#080808;--charcoal:#141414;--grey:#1e1e1e;--border:#2a2a2a;
  --muted:#666;--dim:#888;--light:#ccc;--white:#F5F0E8;
  --gold:#C9A84C;--gold-dim:#7a6028;--gold-bg:#140f02;
  --font-logo:'Bebas Neue',sans-serif;
  --font-body:'Montserrat',sans-serif;
  --font-ui:'Inter',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(8,8,8,0.98);border-bottom:1px solid var(--border);}
.nav-brand{font-family:var(--font-logo);font-size:1.6rem;letter-spacing:0.15em;color:var(--gold);text-decoration:none;}
.nav-links{display:flex;gap:32px;}
.nav-links a{font-family:var(--font-ui);font-size:0.75rem;font-weight:500;letter-spacing:0.12em;color:var(--light);text-decoration:none;transition:color 0.2s;text-transform:uppercase;}
.nav-links a:hover{color:var(--gold);}
.nav-order{font-family:var(--font-ui);font-size:0.72rem;font-weight:700;letter-spacing:0.2em;color:var(--black);background:var(--gold);padding:9px 20px;text-decoration:none;transition:all 0.2s;text-transform:uppercase;}
.nav-order:hover{background:var(--white);}
.nav-hamburger{display:none;background:none;border:none;color:var(--gold);font-size:1.4rem;cursor:pointer;}
.nav-mobile{display:none;position:fixed;top:61px;left:0;right:0;background:var(--charcoal);border-bottom:1px solid var(--border);z-index:99;flex-direction:column;padding:20px;}
.nav-mobile.open{display:flex;}
.nav-mobile a{font-family:var(--font-ui);font-size:0.85rem;font-weight:500;letter-spacing:0.12em;color:var(--light);text-decoration:none;padding:12px 0;border-bottom:1px solid var(--border);text-transform:uppercase;}
.nav-mobile a:last-child{border-bottom:none;}
.mobile-order{color:var(--gold)!important;font-weight:700!important;}

/* LOADING / ERROR */
.state-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:40px;}
.state-box{text-align:center;}
.state-box .ico{font-size:2.5rem;color:var(--gold-dim);margin-bottom:16px;}
.state-box h2{font-family:var(--font-logo);font-size:1.8rem;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;}
.state-box p{font-family:var(--font-ui);font-size:.78rem;color:var(--muted);letter-spacing:.05em;}
.state-box a{color:var(--gold);text-decoration:none;}

/* GARMENT PAGE */
.garment-wrap{max-width:720px;margin:0 auto;padding:100px 24px 80px;}

/* ID BADGE */
.garment-id-badge{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px;}
.garment-id-text{font-family:var(--font-logo);font-size:1.1rem;letter-spacing:.25em;color:var(--gold);}
.garment-id-src{font-family:var(--font-ui);font-size:.6rem;font-weight:600;letter-spacing:.15em;color:var(--dim);text-transform:uppercase;border:1px solid var(--border);padding:2px 8px;}

/* MOCKUP */
.garment-mockup-wrap{width:100%;aspect-ratio:4/3;background:var(--charcoal);border:1px solid var(--border);overflow:hidden;margin-bottom:28px;cursor:zoom-in;}
.garment-mockup-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.garment-mockup-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.garment-mockup-ph span{font-family:var(--font-ui);font-size:.65rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

/* NAMA */
.garment-nama{font-family:var(--font-logo);font-size:clamp(2rem,8vw,3.5rem);letter-spacing:.06em;line-height:1.0;margin-bottom:20px;}

/* INFO GRID */
.garment-info{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);margin-bottom:36px;}
.info-item{padding:18px 20px;border-right:1px solid var(--border);}
.info-item:last-child{border-right:none;}
.info-label{font-family:var(--font-ui);font-size:.58rem;font-weight:600;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
.info-val{font-family:var(--font-ui);font-size:.9rem;font-weight:600;color:var(--white);}

/* PERJALANAN */
.perjalanan-head{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.perjalanan-ico{color:var(--gold);font-size:.9rem;}
.perjalanan-title{font-family:var(--font-ui);font-size:.65rem;font-weight:700;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;}
.perjalanan-count{font-family:var(--font-ui);font-size:.65rem;font-weight:600;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:20px;position:relative;}
.tl-item:not(:last-child) .tl-line{position:absolute;left:7px;top:18px;bottom:-1px;width:1px;background:var(--border);}
.tl-dot-wrap{flex-shrink:0;width:16px;display:flex;flex-direction:column;align-items:center;padding-top:4px;}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--border);border:1px solid var(--muted);flex-shrink:0;}
.tl-dot.origin{background:var(--gold);border-color:var(--gold);}
.tl-dot.scan{background:var(--charcoal);border-color:var(--gold-dim);}
.tl-body{padding:0 0 28px 0;flex:1;}
.tl-kota{font-family:var(--font-ui);font-size:.9rem;font-weight:600;color:var(--white);margin-bottom:3px;}
.tl-kota.origin{color:var(--gold);}
.tl-meta{font-family:var(--font-ui);font-size:.65rem;color:var(--dim);letter-spacing:.05em;}
.tl-badge{display:inline-block;font-family:var(--font-ui);font-size:.55rem;font-weight:700;letter-spacing:.15em;color:var(--gold);border:1px solid rgba(201,168,76,.3);padding:1px 7px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
.tl-empty{font-family:var(--font-ui);font-size:.78rem;color:var(--muted);padding:20px 0;font-style:italic;}

/* SPARK MOMENT */
.spark-moment{margin:32px 0;padding:28px;border:1px solid rgba(201,168,76,.3);background:var(--gold-bg);text-align:center;}
.spark-ico{font-size:1.8rem;color:var(--gold);margin-bottom:8px;animation:pulse 1s ease-in-out 3;}
.spark-label{font-family:var(--font-logo);font-size:1.1rem;letter-spacing:.3em;color:var(--gold);margin-bottom:6px;}
.spark-text{font-family:var(--font-ui);font-size:.82rem;color:var(--light);letter-spacing:.05em;line-height:1.6;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}} .spark-ico{animation:pulse 1s ease-in-out 3;}

/* STATS PERJALANAN */
.perjalanan-stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);margin-bottom:36px;background:var(--charcoal);}
.pstat-item{padding:18px 20px;border-right:1px solid var(--border);text-align:center;}
.pstat-item:last-child{border-right:none;}
.pstat-label{font-family:var(--font-ui);font-size:.55rem;font-weight:600;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
.pstat-val{font-family:var(--font-logo);font-size:1.8rem;letter-spacing:.06em;color:var(--gold);line-height:1;}
.pstat-sub{font-family:var(--font-ui);font-size:.58rem;color:var(--muted);letter-spacing:.08em;margin-top:4px;}
.pstat-rekor{font-family:var(--font-ui);font-size:.6rem;font-weight:600;letter-spacing:.1em;color:var(--gold-dim);margin-top:6px;}

/* SCAN CTA */
.scan-cta{margin-top:40px;border:1px solid var(--border);padding:28px;text-align:center;background:var(--charcoal);}
.scan-cta-title{font-family:var(--font-logo);font-size:1.4rem;letter-spacing:.1em;color:var(--white);margin-bottom:8px;}
.scan-cta-sub{font-family:var(--font-ui);font-size:.75rem;color:var(--dim);margin-bottom:20px;line-height:1.6;}
.scan-cta-btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-ui);font-size:.72rem;font-weight:700;letter-spacing:.2em;color:var(--black);background:var(--gold);padding:12px 28px;text-decoration:none;text-transform:uppercase;transition:background .2s;}
.scan-cta-btn:hover{background:var(--white);}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:32px 40px;display:flex;align-items:center;justify-content:space-between;}
.footer-brand{font-family:var(--font-logo);font-size:1.2rem;letter-spacing:.15em;color:var(--gold-dim);}
.footer-link{font-family:var(--font-ui);font-size:.68rem;color:var(--muted);text-decoration:none;letter-spacing:.1em;}
.footer-link:hover{color:var(--gold);}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;cursor:zoom-out;}
.lightbox.on{opacity:1;pointer-events:all;}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border:1px solid rgba(201,168,76,0.2);}
.lightbox-close{position:absolute;top:20px;right:24px;font-family:var(--font-ui);font-size:0.7rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(245,240,232,0.5);cursor:pointer;}
.lightbox-close:hover{color:var(--gold);}

/* CHECK-IN MODAL */
.checkin-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(4,4,4,0.97);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease;
}
.checkin-overlay.on{opacity:1;pointer-events:all;}
.checkin-modal{
  max-width:480px;width:calc(100% - 48px);
  text-align:center;
  transform:translateY(24px) scale(0.97);
  transition:transform 0.45s cubic-bezier(.16,1,.3,1),opacity 0.45s ease;
  opacity:0;
}
.checkin-overlay.on .checkin-modal{transform:translateY(0) scale(1);opacity:1;}

/* Garis dekoratif atas */
.checkin-topline{
  width:40px;height:1px;background:var(--gold-dim);
  margin:0 auto 32px;
  position:relative;
}
.checkin-topline::before,.checkin-topline::after{
  content:'';position:absolute;top:50%;
  width:4px;height:4px;border-radius:50%;background:var(--gold);
  transform:translateY(-50%);
}
.checkin-topline::before{left:-8px;}
.checkin-topline::after{right:-8px;}

/* Animasi ✦ berputar */
@keyframes sparkspin{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.2);}100%{transform:rotate(360deg) scale(1);}}
.checkin-spark{
  font-size:2.8rem;color:var(--gold);
  display:block;margin-bottom:20px;
  animation:sparkspin 2s ease-in-out infinite;
  line-height:1;
}

.checkin-headline{
  font-family:var(--font-logo);font-size:clamp(2.2rem,11vw,3.4rem);
  letter-spacing:.06em;line-height:1.05;color:var(--white);
  margin-bottom:20px;
}
.checkin-sub{
  font-family:var(--font-ui);font-size:.82rem;color:var(--dim);
  line-height:1.8;letter-spacing:.05em;
}

@media(max-width:768px){
  nav{padding:14px 18px;}
  .nav-links,.nav-order{display:none;}
  .nav-hamburger{display:block;}
  .garment-wrap{padding:80px 18px 60px;}
  .garment-info{grid-template-columns:repeat(3,1fr);}
  .info-item{padding:14px 12px;}
  footer{padding:24px 18px;}
}

<script>
var SHEET_ID = '1J9SVJGQb7msPTEOpUgsJ2TWWvQ4TntIjrkHZ9nbKgbw';

function toggleMenu() {
  var m = document.getElementById('nav-mobile');
  var h = document.getElementById('hamburger');
  m.classList.toggle('open');
  h.textContent = m.classList.contains('open') ? '✕' : '☰';
}

function driveUrl(url) {
  if (!url) return '';
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w800' : url;
}

function getGarmentId() {
  // Ambil ID dari path: /id/NAMA-ID atau /id/NAMA-ID?src=qr
  var path = window.location.pathname;
  var match = path.match(/^\/id\/(.+)$/);
  if (!match) return null;
  return decodeURIComponent(match[1]);
}

function formatTimestamp(ts) {
  if (!ts) return '';
  try {
    var str = ts.toString().trim();
    // Format: "10/3/2026, 12.11.46" atau "10/3/2026, 12:11:46"
    var parts = str.split(',');
    var dp = parts[0].trim().split('/');
    if (dp.length === 3) {
      var d = new Date(parseInt(dp[2]), parseInt(dp[1]) - 1, parseInt(dp[0]));
      if (!isNaN(d)) return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }
  } catch(e) {}
  return ts.toString();
}

function showError(pesan) {
  document.getElementById('page-content').innerHTML =
    '<div class="state-wrap"><div class="state-box">' +
    '<div class="ico">✦</div>' +
    '<h2>Tidak Ditemukan</h2>' +
    '<p>' + pesan + '</p>' +
    '<p style="margin-top:16px"><a href="/karya">← Lihat semua koleksi</a></p>' +
    '</div></div>';
}

function initLightbox() {
  var lb = document.getElementById('lightbox');
  lb.addEventListener('click', function() {
    lb.classList.remove('on');
    document.body.style.overflow = '';
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { lb.classList.remove('on'); document.body.style.overflow = ''; }
  });
}

async function init() {
  var garmentId = getGarmentId();
  if (!garmentId) { showError('ID garment tidak valid.'); return; }

  // Update canonical
  document.querySelector('link[rel="canonical"]').href = 'https://blumbang.id/id/' + encodeURIComponent(garmentId);

  try {
    // Fetch GARMENTS dan SPARKS paralel
    var results = await Promise.all([
      fetch('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=GARMENTS'),
      fetch('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=SPARKS')
    ]);

    var garTxt = await results[0].text();
    var spkTxt = await results[1].text();

    var garMatch = garTxt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    var spkMatch = spkTxt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);

    var garRows = garMatch ? JSON.parse(garMatch[1]).table.rows || [] : [];
    var spkRows = spkMatch ? JSON.parse(spkMatch[1]).table.rows || [] : [];

    // Cari garment — case insensitive, trim
    var garment = null;
    for (var i = 0; i < garRows.length; i++) {
      var rowId = garRows[i].c[0] && garRows[i].c[0].v;
      if (rowId && rowId.toString().trim().toLowerCase() === garmentId.trim().toLowerCase()) {
        garment = garRows[i];
        break;
      }
    }

    if (!garment) {
      showError('Garment <strong>' + garmentId + '</strong> tidak ditemukan dalam sistem.');
      return;
    }

    var id      = garment.c[0].v;
    var nama    = ((garment.c[1] && garment.c[1].v) || id).replace(/\n/g, ' ');
    var origin  = (garment.c[2] && garment.c[2].v) || 'Klaten';
    var year    = (garment.c[3] && garment.c[3].v) || '2026';
    var edition = (garment.c[4] && garment.c[4].v) || '—';
    var mockup  = driveUrl((garment.c[5] && garment.c[5].v) || '');

    // Fallback mockup: cari dari garment lain dalam seri yang sama
    if (!mockup) {
      var prefix = id.replace(/-\d+$/, '').toLowerCase();
      for (var i = 0; i < garRows.length; i++) {
        var gid = garRows[i].c[0] && garRows[i].c[0].v;
        var gmockup = garRows[i].c[5] && garRows[i].c[5].v;
        if (gid && gmockup && gid.toString().replace(/-\d+$/, '').toLowerCase() === prefix) {
          mockup = driveUrl(gmockup);
          break;
        }
      }
    }

    // Update title
    document.title = id + ' · ' + nama + ' · Blumbang.id';

    // Ambil scan untuk garment ini (skip baris header)
    var scans = [];
    for (var i = 1; i < spkRows.length; i++) {
      var r = spkRows[i];
      var sid = r.c[0] && r.c[0].v;
      if (!sid || sid.toString().trim().toLowerCase() !== id.trim().toLowerCase()) continue;
      var lokasi = (r.c[2] && r.c[2].v) || '';
      var ts     = (r.c[6] && r.c[6].v) || '';
      scans.push({ lokasi: lokasi, ts: ts });
    }

    // Catat scan kalau dari QR
    var fromQr = window.location.search.indexOf('src=qr') >= 0;
    var srcBadge = fromQr ? '<span class="garment-id-src">QR Scan</span>' : '';

    // Simpan data garment untuk dipakai modal
    window._checkinGarmentId = id;
    window._checkinScansCount = scans.length;

    // Spark moment — ditampilkan setelah check-in berhasil (bukan langsung)
    var sparkNo = scans.length + 1;
    var sparkHtml = '';
    if (fromQr) {
      // Spark hidden awalnya, akan di-reveal oleh doCheckin()
      var sparkTeks = scans.length === 0
        ? 'Kamu yang pertama. Perjalanan dimulai dari sini.'
        : sparkNo + ' perjalanan. Kamu yang terbaru.';
      sparkHtml += '<div class="spark-moment" id="spark-box" style="opacity:0;transform:translateY(8px);transition:all 0.6s ease;">';
      sparkHtml += '<div class="spark-ico">✦</div>';
      sparkHtml += '<div class="spark-label" id="spark-label">Spark #' + sparkNo + '</div>';
      sparkHtml += '<div class="spark-text" id="spark-text">' + sparkTeks + '</div>';
      sparkHtml += '</div>';
    }

    // ── GAMIFIKASI ────────────────────────────────────────────────
    var KOTA_COORDS = {
      'klaten':[-7.749,110.670],'yogyakarta':[-7.797,110.364],'jogja':[-7.803,110.364],
      'jakarta':[-6.208,106.845],'surakarta':[-7.566,110.826],'solo':[-7.566,110.826],
      'bandung':[-6.917,107.608],'semarang':[-6.967,110.424],'surabaya':[-7.246,112.752],
      'bali':[-8.34,115.092],'denpasar':[-8.65,115.217],'tokyo':[35.689,139.691],
      'victoria':[-4.62,55.455],'ile au cerf':[-4.64,55.508],'pontianak':[-0.02,109.342],
      'samarinda':[-0.502,117.136],'banjarmasin':[-3.317,114.592],'kota banjarmasin':[-3.317,114.592],
      'banjarbaru':[-3.442,114.831],'kediri':[-7.816,112.008],'sleman':[-7.717,110.355],
      'boyolali':[-7.532,110.599],'wonosobo':[-7.361,109.905],'banyumas':[-7.513,109.215],
      'sukoharjo':[-7.682,110.839],'bulakamba':[-6.867,108.988],'selogiri':[-7.783,110.895],
      'kijang':[0.917,104.633],'trucuk':[-7.713,110.617],'berbak':[-1.4,103.5]
    };
    function hvs(la1,lo1,la2,lo2){
      var R=6371,dL=( la2-la1)*Math.PI/180,dG=(lo2-lo1)*Math.PI/180;
      var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);
      return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
    }

    // Hitung kota unik garment ini
    var kotaUnikSet = new Set();
    var rekorTerjauh = 0;
    for (var i = 1; i < spkRows.length; i++) {
      var r = spkRows[i];
      var sid = r.c[0] && r.c[0].v;
      if (!sid || sid.toString().trim().toLowerCase() !== id.trim().toLowerCase()) continue;
      var lokasi = (r.c[2] && r.c[2].v) || '';
      if (lokasi) kotaUnikSet.add(lokasi.split(',')[0].trim().toLowerCase());
      // Rekor terjauh — dari kolom distance_km (index 10) kalau ada, fallback KOTA_COORDS
      var dist = r.c[10] && r.c[10].v ? parseFloat(r.c[10].v) : 0;
      if (!dist && lokasi) {
        var key = lokasi.split(',')[0].trim().toLowerCase();
        var coord = KOTA_COORDS[key];
        if (coord) dist = hvs(-7.749, 110.670, coord[0], coord[1]);
      }
      if (dist > rekorTerjauh) rekorTerjauh = dist;
    }

    // Hitung peringkat kota unik dibanding semua garment
    var allGarmentKota = {};
    for (var i = 1; i < spkRows.length; i++) {
      var r = spkRows[i];
      var sid = r.c[0] && r.c[0].v;
      if (!sid) continue;
      var gid = sid.toString().trim();
      var lokasi = (r.c[2] && r.c[2].v) || '';
      if (!lokasi) continue;
      if (!allGarmentKota[gid]) allGarmentKota[gid] = new Set();
      allGarmentKota[gid].add(lokasi.split(',')[0].trim().toLowerCase());
    }
    var myKotaCount = kotaUnikSet.size;
    var peringkat = 1;
    Object.values(allGarmentKota).forEach(function(s) {
      if (s.size > myKotaCount) peringkat++;
    });
    var totalGarment = garRows.length;

    // HTML stats
    var statsHtml = '';
    if (scans.length > 0) {
      statsHtml = '<div class="perjalanan-stats">';
      statsHtml += '<div class="pstat-item">';
      statsHtml += '<div class="pstat-label">Kota Unik</div>';
      statsHtml += '<div class="pstat-val">' + myKotaCount + '</div>';
      statsHtml += '<div class="pstat-sub">kota berbeda</div>';
      statsHtml += '</div>';
      statsHtml += '<div class="pstat-item">';
      statsHtml += '<div class="pstat-label">Rekor Terjauh</div>';
      if (rekorTerjauh > 0) {
        statsHtml += '<div class="pstat-val">' + rekorTerjauh.toLocaleString('id-ID') + '</div>';
        statsHtml += '<div class="pstat-sub">km dari Klaten</div>';
      } else {
        statsHtml += '<div class="pstat-val" style="font-size:1rem;color:var(--dim)">—</div>';
        statsHtml += '<div class="pstat-sub">belum terukur</div>';
      }
      statsHtml += '</div>';
      statsHtml += '<div class="pstat-item">';
      statsHtml += '<div class="pstat-label">Peringkat</div>';
      statsHtml += '<div class="pstat-val">#' + peringkat + '</div>';
      statsHtml += '<div class="pstat-sub">dari ' + totalGarment + ' kaos</div>';
      statsHtml += '</div>';
      statsHtml += '</div>';
    }
    // ── END GAMIFIKASI ────────────────────────────────────────────

    var mockupHtml = mockup
      ? '<img src="' + mockup + '" alt="' + nama + '" onclick="bukaLightbox(this.src)">'
      : '<div class="garment-mockup-ph"><span>&#x2726;</span><span>Mockup Coming Soon</span></div>';

    // Timeline — scan terbaru di atas, Origin di bawah
    var timelineHtml = '';

    if (scans.length === 0) {
      timelineHtml += '<div class="tl-empty">Kaos ini belum pernah di-scan di luar kota asal. Jadilah yang pertama!</div>';
    } else {
      var scansReversed = scans.slice().reverse();
      for (var i = 0; i < scansReversed.length; i++) {
        var s = scansReversed[i];
        var kota = s.lokasi ? s.lokasi.split(',')[0].trim() : '—';
        var negara = s.lokasi && s.lokasi.indexOf(',') >= 0 ? s.lokasi.split(',').pop().trim() : '';
        var tanggal = formatTimestamp(s.ts);
        timelineHtml += '<div class="tl-item">';
        timelineHtml += '<div class="tl-dot-wrap"><div class="tl-dot scan"></div><div class="tl-line"></div></div>';
        timelineHtml += '<div class="tl-body">';
        timelineHtml += '<div class="tl-kota">' + kota + (negara ? ' <span style="color:var(--dim);font-size:.75em">· ' + negara + '</span>' : '') + '</div>';
        timelineHtml += '<div class="tl-meta">' + tanggal + '</div>';
        timelineHtml += '</div></div>';
      }
    }

    // Origin selalu paling bawah
    timelineHtml += '<div class="tl-item">';
    timelineHtml += '<div class="tl-dot-wrap"><div class="tl-dot origin"></div></div>';
    timelineHtml += '<div class="tl-body"><div class="tl-kota origin">' + origin + '<span class="tl-badge">Origin</span></div>';
    timelineHtml += '<div class="tl-meta">Lahir di sini · ' + year + '</div></div></div>';

    var html = '<div class="garment-wrap">';
    html += '<div class="garment-id-badge"><span class="garment-id-text">' + id + '</span>' + srcBadge + '</div>';
    html += '<div class="garment-mockup-wrap">' + mockupHtml + '</div>';
    html += '<div class="garment-nama">' + nama + '</div>';
    html += '<div class="garment-info">';
    html += '<div class="info-item"><div class="info-label">Dibuat di</div><div class="info-val">' + origin + '</div></div>';
    html += '<div class="info-item"><div class="info-label">Tahun</div><div class="info-val">' + year + '</div></div>';
    html += '<div class="info-item"><div class="info-label">Edisi</div><div class="info-val">' + edition + '</div></div>';
    html += '</div>';
    html += statsHtml;
    html += sparkHtml;
    html += '<div class="perjalanan-head">';
    html += '<span class="perjalanan-ico">✦</span>';
    html += '<span class="perjalanan-title">Perjalanan Kaos Ini</span>';
    html += '<span class="perjalanan-count">' + scans.length + ' scan</span>';
    html += '</div>';
    html += '<div class="timeline">' + timelineHtml + '</div>';
    html += '<div class="scan-cta">';
    html += '<div class="scan-cta-title">Sedang Pakai Kaos Ini?</div>';
    html += '<div class="scan-cta-sub">Scan QR di label bagian dalam saat kamu mengunjungi tempat baru.<br>Perjalananmu akan tercatat selamanya di sini.</div>';
    html += '<a href="https://wa.me/6281234561146" class="scan-cta-btn">✦ &nbsp; Tanya via WhatsApp</a>';
    html += '</div>';
    html += '</div>';
    html += '<footer><a href="/" class="footer-brand">BLUMB✦NG</a><a href="/karya" class="footer-link">← Lihat Semua Koleksi</a></footer>';

    document.getElementById('page-content').innerHTML = html;
    initLightbox();

    // Trigger check-in modal kalau dari QR
    if (fromQr) {
      setTimeout(function() { bukaCheckinModal(); }, 800);
    }

  } catch(e) {
    console.error('Garment error:', e);
    showError('Gagal memuat data. Coba refresh halaman.');
  }
}

function bukaLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('on');
  document.body.style.overflow = 'hidden';
}

var APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbx3aQma_SB1gMiSUuPPr6Ol6BwKlN1QtIV5EUJa1UM6Fli0H88Jg0aIxxTnlR1bRNY/exec';

function bukaCheckinModal() {
  var overlay = document.getElementById('checkin-overlay');
  overlay.classList.add('on');
  document.body.style.overflow = 'hidden';
  // Record lokasi di background, tidak tunggu
  recordScan(window._checkinGarmentId);
  // Auto tutup 3 detik
  setTimeout(function() {
    overlay.classList.remove('on');
    document.body.style.overflow = '';
    revealSparkBox();
  }, 3000);
}

async function recordScan(garmentId) {
  try {
    var res = await fetch('https://ipapi.co/json/');
    var geo = await res.json();
    var kota = geo.city || '';
    var negara = geo.country_name || '';
    if (!kota) return;
    var city = negara ? kota + ', ' + negara : kota;
    await fetch(APPS_SCRIPT, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'scan', garment_id: garmentId, city: city, lat: geo.latitude || '', lng: geo.longitude || '' })
    });
    updateTimelineAfterScan(kota, negara);
  } catch(e) {}
}

function revealSparkBox() {
  var sparkBox = document.getElementById('spark-box');
  if (!sparkBox) return;
  setTimeout(function() {
    sparkBox.style.opacity = '1';
    sparkBox.style.transform = 'translateY(0)';
    sparkBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function updateTimelineAfterScan(kota, negara) {
  var timeline = document.querySelector('.timeline');
  if (!timeline) return;
  var today = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
  var negaraHtml = negara ? ' <span style="color:var(--dim);font-size:.75em">· ' + negara + '</span>' : '';
  var newItem = document.createElement('div');
  newItem.className = 'tl-item tl-new';
  newItem.style.opacity = '0';
  newItem.style.transform = 'translateY(-10px)';
  newItem.style.transition = 'all 0.5s ease';
  newItem.innerHTML =
    '<div class="tl-dot-wrap"><div class="tl-dot scan"></div><div class="tl-line"></div></div>' +
    '<div class="tl-body">' +
    '<div class="tl-kota">' + kota + negaraHtml + '</div>' +
    '<div class="tl-meta">' + today + ' · Baru saja</div>' +
    '</div>';
  timeline.insertBefore(newItem, timeline.firstChild);
  setTimeout(function() {
    newItem.style.opacity = '1';
    newItem.style.transform = 'translateY(0)';
  }, 100);
  var countEl = document.querySelector('.perjalanan-count');
  if (countEl) {
    var current = parseInt(countEl.textContent) || 0;
    countEl.textContent = (current + 1) + ' scan';
  }
  var sparkLabel = document.getElementById('spark-label');
  var sparkText = document.getElementById('spark-text');
  if (sparkLabel) {
    var total = (window._checkinScansCount || 0) + 1;
    sparkLabel.textContent = 'Spark #' + total;
    if (sparkText) sparkText.textContent = total + ' perjalanan. Kamu yang terbaru.';
  }
}

init();
</script>
