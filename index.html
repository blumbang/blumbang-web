<style>
:root{
  --black:#080808;--charcoal:#141414;--grey:#1e1e1e;--border:#333;
  --muted:#777;--dim:#999;--light:#ddd;--white:#F5F0E8;
  --gold:#C9A84C;--gold-dim:#8a6f2e;--gold-bg:#1a1508;
  --font-logo:'Bebas Neue',sans-serif;
  --font-body:'Montserrat',sans-serif;
  --font-ui:'Inter',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:72px 72px;pointer-events:none;z-index:0;}
.corner{position:fixed;width:36px;height:36px;z-index:2;pointer-events:none;}
.corner::before,.corner::after{content:'';position:absolute;background:var(--gold-dim);}
.corner::before{width:100%;height:1px;top:0;left:0;}
.corner::after{width:1px;height:100%;top:0;left:0;}
.corner.tl{top:20px;left:20px;}.corner.tr{top:20px;right:20px;transform:scaleX(-1);}
.corner.bl{bottom:20px;left:20px;transform:scaleY(-1);}.corner.br{bottom:20px;right:20px;transform:scale(-1);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 40px;background:linear-gradient(to bottom,rgba(8,8,8,0.97),transparent);}
.nav-brand{font-family:var(--font-logo);font-size:1.6rem;letter-spacing:0.15em;color:var(--gold);text-decoration:none;line-height:1;}
.spark{display:inline-block;animation:spin 6s linear infinite;font-size:1rem;vertical-align:middle;}
@keyframes spin{0%,100%{transform:rotate(0deg)scale(1);}50%{transform:rotate(180deg)scale(0.8);}}
.nav-links{display:flex;gap:32px;}
.nav-links a{font-family:var(--font-ui);font-size:0.75rem;font-weight:500;letter-spacing:0.12em;color:var(--light);text-decoration:none;transition:color 0.2s;text-transform:uppercase;}
.nav-links a:hover{color:var(--gold);}
.nav-id{font-family:var(--font-ui);font-size:0.75rem;letter-spacing:0.15em;color:var(--gold);}

/* HOME */
#page-home{display:none;position:relative;z-index:1;}
#page-home.active{display:block;}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 40px 80px;position:relative;}
.hero-eyebrow{font-family:var(--font-ui);font-size:0.8rem;font-weight:500;letter-spacing:0.5em;color:var(--gold);margin-bottom:48px;opacity:0;animation:fadeUp 1s ease 0.2s forwards;text-transform:uppercase;}
.hero-title{font-family:var(--font-logo);font-size:clamp(5rem,14vw,11rem);font-weight:400;line-height:0.9;letter-spacing:0.05em;margin-bottom:0;opacity:0;animation:fadeUp 1.2s ease 0.4s forwards;}
.hero-title .outline{color:transparent;-webkit-text-stroke:2px rgba(245,240,232,0.25);}
.hero-sub{margin-top:40px;font-family:var(--font-body);font-size:clamp(1rem,2.2vw,1.25rem);font-style:italic;font-weight:300;color:var(--white);max-width:500px;line-height:1.9;opacity:0;animation:fadeUp 1s ease 0.8s forwards;}
.hero-vline{width:1px;height:80px;background:linear-gradient(to bottom,transparent,var(--gold-dim),transparent);margin:48px auto;opacity:0;animation:fadeIn 1s ease 1.2s forwards;}

/* SPARK COUNTER */
.spark-counter{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fadeUp 1s ease 1s forwards;}
.spark-number{font-family:var(--font-logo);font-size:clamp(3rem,7vw,5rem);color:var(--gold);letter-spacing:0.08em;line-height:1;}
.spark-label{font-family:var(--font-ui);font-size:0.75rem;font-weight:600;letter-spacing:0.35em;color:var(--light);text-transform:uppercase;}
.spark-sublabel{font-family:var(--font-body);font-size:1rem;font-style:italic;color:var(--dim);}

/* LATEST SPARK */
.latest-spark{margin-top:40px;opacity:0;animation:fadeIn 1s ease 1.4s forwards;}
.latest-spark-inner{display:inline-flex;align-items:center;gap:12px;border:1px solid var(--border);padding:12px 24px;background:var(--charcoal);}
.ls-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
.ls-text{font-family:var(--font-ui);font-size:0.78rem;font-weight:500;letter-spacing:0.1em;color:var(--light);}
.ls-city{color:var(--gold);font-weight:600;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.4);}}

/* SPARK MAP */
.spark-map{margin-top:48px;opacity:0;animation:fadeUp 1s ease 1.5s forwards;width:100%;max-width:560px;}
.spark-map-label{font-family:var(--font-ui);font-size:0.75rem;font-weight:600;letter-spacing:0.35em;color:var(--gold);margin-bottom:16px;text-transform:uppercase;}
.spark-map-box{border:1px solid var(--border);background:var(--charcoal);padding:20px;position:relative;}
.spark-cities{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.spark-city{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:0.75rem;font-weight:500;color:var(--light);background:var(--black);border:1px solid var(--border);padding:6px 14px;}
.spark-city .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
.spark-city.origin{border-color:var(--gold-dim);color:var(--gold);}
.spark-empty{font-family:var(--font-ui);font-size:0.75rem;color:var(--muted);text-align:center;padding:8px;}

/* CTA */
.hero-cta{margin-top:56px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp 1s ease 1.6s forwards;}
.btn-primary{padding:16px 36px;background:var(--gold-bg);border:1px solid var(--gold);color:var(--gold);font-family:var(--font-ui);font-size:0.78rem;font-weight:600;letter-spacing:0.25em;text-decoration:none;transition:all 0.25s;text-transform:uppercase;}
.btn-primary:hover{background:var(--gold);color:var(--black);}
.btn-ghost{padding:16px 36px;background:transparent;border:1px solid var(--border);color:var(--white);font-family:var(--font-ui);font-size:0.78rem;font-weight:500;letter-spacing:0.2em;text-decoration:none;transition:all 0.25s;text-transform:uppercase;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

/* IDENTITY SECTION */
.section{padding:120px 40px;position:relative;z-index:1;}
.section-inner{max-width:1100px;margin:0 auto;}
.section-tag{font-family:var(--font-ui);font-size:0.75rem;font-weight:600;letter-spacing:0.4em;color:var(--gold);margin-bottom:24px;display:block;text-transform:uppercase;}
.section-title{font-family:var(--font-logo);font-size:clamp(2.5rem,6vw,5rem);letter-spacing:0.05em;line-height:1.05;margin-bottom:24px;}
.section-body{font-family:var(--font-body);font-size:1.1rem;font-weight:300;font-style:italic;line-height:1.9;color:var(--white);max-width:560px;}

/* IDENTITY GRID */
.identity-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-top:64px;}
.identity-card{background:var(--charcoal);padding:40px;position:relative;overflow:hidden;transition:background 0.3s;}
.identity-card:hover{background:var(--grey);}
.identity-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);opacity:0;transition:opacity 0.3s;}
.identity-card:hover::before{opacity:1;}
.ic-num{font-family:var(--font-logo);font-size:2rem;letter-spacing:0.1em;color:var(--gold-dim);margin-bottom:16px;}
.ic-title{font-family:var(--font-body);font-size:1.3rem;font-weight:600;margin-bottom:12px;color:var(--white);}
.ic-body{font-family:var(--font-body);font-size:0.95rem;line-height:1.85;color:var(--light);}
.ic-spark{position:absolute;bottom:24px;right:24px;font-size:1.2rem;color:var(--gold-dim);opacity:0.5;}

/* PROCESS */
.process-section{padding:120px 40px;position:relative;z-index:1;border-top:1px solid var(--border);}
.process-inner{max-width:1100px;margin:0 auto;}
.process-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:64px;}
.ps-item{background:var(--charcoal);padding:40px 32px;}
.ps-num{font-family:var(--font-logo);font-size:3rem;letter-spacing:0.1em;color:var(--gold-dim);margin-bottom:20px;line-height:1;}
.ps-title{font-family:var(--font-body);font-size:1.15rem;font-weight:600;margin-bottom:10px;color:var(--white);}
.ps-body{font-family:var(--font-body);font-size:0.95rem;line-height:1.85;color:var(--light);}

/* MANIFESTO */
.manifesto{padding:120px 40px;text-align:center;position:relative;z-index:1;border-top:1px solid var(--border);}
.manifesto-inner{max-width:720px;margin:0 auto;}
.manifesto-quote{font-family:var(--font-body);font-size:clamp(1.6rem,3.5vw,2.6rem);font-weight:300;font-style:italic;line-height:1.5;color:var(--white);margin-bottom:32px;}
.manifesto-quote em{font-style:normal;color:var(--gold);font-weight:600;}
.manifesto-attr{font-family:var(--font-ui);font-size:0.75rem;font-weight:500;letter-spacing:0.35em;color:var(--light);text-transform:uppercase;}

/* FOOTER */
footer{padding:40px;border-top:1px solid var(--border);position:relative;z-index:1;}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.footer-brand{font-family:var(--font-logo);font-size:1.4rem;letter-spacing:0.15em;color:var(--gold);}
.footer-links{display:flex;gap:28px;}
.footer-links a{font-family:var(--font-ui);font-size:0.75rem;font-weight:500;letter-spacing:0.15em;color:var(--light);text-decoration:none;transition:color 0.2s;text-transform:uppercase;}
.footer-links a:hover{color:var(--gold);}
.footer-copy{font-family:var(--font-ui);font-size:0.72rem;letter-spacing:0.12em;color:var(--dim);}

/* GARMENT PAGE */

#page-garment.active{display:block;}
.gw{max-width:640px;margin:0 auto;padding:0 24px;}
.g-hdr{text-align:center;margin-bottom:48px;opacity:0;animation:fadeUp 1s ease 0.1s forwards;}
.g-lbl{font-family:var(--font-ui);font-size:0.75rem;font-weight:600;letter-spacing:0.35em;color:var(--gold);margin-bottom:12px;text-transform:uppercase;}
.g-id{font-family:var(--font-logo);font-size:clamp(2.5rem,8vw,4rem);letter-spacing:0.12em;color:var(--gold);margin-bottom:8px;line-height:1;}
.g-nm{font-family:var(--font-body);font-size:clamp(1.4rem,4vw,2rem);font-weight:300;font-style:italic;color:var(--white);line-height:1.3;}
.g-div{display:flex;align-items:center;gap:16px;margin:32px 0;opacity:0;animation:fadeIn 1s ease 0.3s forwards;}
.g-div::before,.g-div::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);}
.g-div span{font-family:var(--font-ui);font-size:0.8rem;color:var(--gold-dim);}
.g-mock{position:relative;border:1px solid var(--border);background:var(--charcoal);overflow:hidden;margin-bottom:40px;opacity:0;animation:fadeUp 1s ease 0.4s forwards;}
.g-mock img{width:100%;display:block;object-fit:cover;}
.g-ph{width:100%;aspect-ratio:3/2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,#111,#1a1a1a);}
.g-ph .ps{font-size:2rem;color:var(--gold-dim);animation:spin 8s linear infinite;}

.g-stl{font-family:var(--font-ui);font-size:0.75rem;font-weight:600;letter-spacing:0.3em;color:var(--gold);margin-bottom:20px;text-transform:uppercase;}

.jlist{display:flex;flex-direction:column;}
.ji{display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-bottom:1px solid var(--border);}

.sct{font-family:var(--font-ui);font-size:0.73rem;letter-spacing:0.1em;color:var(--gold);margin-top:3px;}
.stxt{font-family:var(--font-body);font-size:1rem;font-weight:300;font-style:italic;line-height:1.8;color:var(--white);}
.semp{text-align:center;padding:32px;font-family:var(--font-ui);font-size:0.8rem;font-weight:500;letter-spacing:0.2em;color:var(--dim);}

.fl{display:block;font-family:var(--font-ui);font-size:0.73rem;font-weight:600;letter-spacing:0.15em;color:var(--light);margin-bottom:8px;text-transform:uppercase;}
.fi,.fta{width:100%;background:var(--black);border:1px solid var(--border);color:var(--white);font-family:var(--font-body);font-size:1rem;padding:14px 16px;outline:none;transition:border-color 0.2s;border-radius:0;-webkit-appearance:none;}

.uprev{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-dim);margin:0 auto 10px;display:none;}
.fbtn{width:100%;padding:18px;background:var(--gold-bg);border:1px solid var(--gold);color:var(--gold);font-family:var(--font-ui);font-size:0.8rem;font-weight:700;letter-spacing:0.3em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}

.ferr{margin-top:12px;font-family:var(--font-ui);font-size:0.75rem;font-weight:500;color:#e74c3c;letter-spacing:0.05em;display:none;}
.fok{display:none;text-align:center;padding:40px;}
.fok .bsp{font-size:3rem;color:var(--gold);display:block;margin-bottom:20px;animation:spin 4s linear infinite;}

.g-ftr{text-align:center;padding:32px 0 0;border-top:1px solid var(--border);opacity:0;animation:fadeIn 1s ease 1s forwards;}
.g-ftr a{font-family:var(--font-ui);font-size:0.75rem;font-weight:500;letter-spacing:0.2em;color:var(--light);text-decoration:none;transition:color 0.2s;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

@media(max-width:768px){
  nav{padding:16px 20px;}.nav-links{display:none;}

  .footer-inner{flex-direction:column;text-align:center;}
  .gw{padding:0 16px;}.g-fs{padding:20px;}
}
</style>
</head>
