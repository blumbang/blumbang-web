function getCityCoord(cityStr){
  if(!cityStr) return null;
  const lower=cityStr.toLowerCase();
  for(const key of Object.keys(CITY_COORDS)){
    if(lower.includes(key)) return CITY_COORDS[key];
  }
  return null;
}

function buildMap(rows){
  const citiesRow=document.getElementById('cities-row');
  const tooltip=document.getElementById('map-tooltip');
  const cityMap={};
  rows.forEach(function(r){
    const c=r.c[2]&&r.c[2].v;
    if(!c) return;
    const coord=getCityCoord(c);
    if(!coord) return;
    if(!cityMap[coord.label]) cityMap[coord.label]={coord,count:0};
    cityMap[coord.label].count++;
  });

  const w = window.innerWidth || document.documentElement.clientWidth;
  const h = (window.innerHeight || document.documentElement.clientHeight) - 61;

  const svg = d3.select('#d3-world-map')
    .attr('width', w).attr('height', h)
    .attr('viewBox', '0 0 ' + w + ' ' + h);

  // Center peta di Indonesia - rotate -118 agar Indonesia di tengah
  const scale = Math.min(w, h) * 0.9;
  const projection = d3.geoNaturalEarth1()
    .scale(scale)
    .rotate([-118, 5, 0])
    .translate([w / 2, h / 2]);

  const pathGen = d3.geoPath().projection(projection);

  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(function(r){return r.json();})
    .then(function(world){
      const countries = topojson.feature(world, world.objects.countries);

      svg.append('path').datum(d3.geoGraticule()()).attr('d', pathGen)
        .attr('fill','none').attr('stroke','rgba(255,255,255,0.03)').attr('stroke-width','0.5');

      svg.selectAll('path.country').data(countries.features).enter().append('path')
        .attr('class','country').attr('d', pathGen)
        .attr('fill', function(d){ return d.id===360 ? 'rgba(201,168,76,0.5)' : 'rgba(30,60,100,0.2)'; })
        .attr('stroke','rgba(255,255,255,0.1)').attr('stroke-width','0.3');

      const KLATEN = [110.6, -7.7];
      const kPx = projection(KLATEN);
      if(!kPx) return;

      // Garis dari Klaten ke kota lain
      Object.values(cityMap).forEach(function(item){
        const px = projection(item.coord.lonlat);
        if(!px) return;
        svg.append('line')
          .attr('x1',kPx[0]).attr('y1',kPx[1]).attr('x2',px[0]).attr('y2',px[1])
          .attr('stroke','rgba(201,168,76,0.18)').attr('stroke-width','0.6').attr('stroke-dasharray','3,5');
      });

      // Titik kota - kecil, kelap-kelip seperti dot di bawah
      Object.values(cityMap).forEach(function(item){
        const px = projection(item.coord.lonlat);
        if(!px) return;
        const cx = px[0], cy = px[1];

        // Pulse ring - tipis seperti sinyal
        const ring = svg.append('circle')
          .attr('cx',cx).attr('cy',cy).attr('r',2)
          .attr('fill','none')
          .attr('stroke','rgba(201,168,76,0.6)')
          .attr('stroke-width','0.8');

        function blink(){
          ring.attr('r',2).attr('opacity',1)
            .transition().duration(1600).ease(d3.easeLinear)
            .attr('r',10).attr('opacity',0)
            .on('end', blink);
        }
        blink();

        // Titik inti - kecil seperti dot di city-tag bawah
        svg.append('circle')
          .attr('cx',cx).attr('cy',cy).attr('r',2.5)
          .attr('fill','#C9A84C')
          .attr('stroke','rgba(255,255,255,0.5)')
          .attr('stroke-width','0.5');

        // Label kota - selalu tampil, kecil
        const labelX = cx + 5;
        const labelAnchor = cx > w * 0.8 ? 'end' : 'start';
        const lx = cx > w * 0.8 ? cx - 5 : cx + 5;
        svg.append('text')
          .attr('x', lx).attr('y', cy - 4)
          .attr('text-anchor', labelAnchor)
          .attr('font-size','8px')
          .attr('font-family','Inter,sans-serif')
          .attr('fill','rgba(245,240,232,0.75)')
          .attr('font-weight','500')
          .text(item.coord.label);
      });

      // Klaten - titik origin, sedikit lebih besar
      const kRing = svg.append('circle')
        .attr('cx',kPx[0]).attr('cy',kPx[1]).attr('r',3)
        .attr('fill','none')
        .attr('stroke','rgba(201,168,76,0.8)')
        .attr('stroke-width','1');

      function blinkKlaten(){
        kRing.attr('r',3).attr('opacity',1)
          .transition().duration(2200).ease(d3.easeLinear)
          .attr('r',16).attr('opacity',0)
          .on('end', blinkKlaten);
      }
      blinkKlaten();

      svg.append('circle')
        .attr('cx',kPx[0]).attr('cy',kPx[1]).attr('r',4)
        .attr('fill','#C9A84C')
        .attr('stroke','#fff')
        .attr('stroke-width','1');

      // Label Klaten
      svg.append('text')
        .attr('x', kPx[0] + 7).attr('y', kPx[1] - 5)
        .attr('font-size','9px')
        .attr('font-family','Inter,sans-serif')
        .attr('fill','#C9A84C')
        .attr('font-weight','700')
        .text('Klaten · Origin');

      // City tags bawah
      Object.keys(cityMap).forEach(function(label){
        citiesRow.innerHTML += '<div class="city-tag"><span class="dot"></span>'+label+'</div>';
      });

      document.getElementById('loading').style.display='none';
    }).catch(function(){
      document.getElementById('loading').style.display='none';
    });
}

// Load SPARKS data
requestAnimationFrame(function(){
fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet=SPARKS')
  .then(function(r){return r.text();})
  .then(function(txt){
    const m=txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    const json=JSON.parse(m[1]);
    const rows=json.table.rows||[];

    const uniqueG=new Set(rows.filter(function(r){return r.c[0]&&r.c[0].v;}).map(function(r){return r.c[0].v;}));
    animateNum('stat-garments',uniqueG.size);
    animateNum('stat-perjalanan',rows.filter(function(r){return r.c[0]&&r.c[0].v;}).length);
    const citySet=new Set(['klaten']);
    rows.forEach(function(r){const c=r.c[2]&&r.c[2].v;if(c)citySet.add(c.split(',')[0].trim().toLowerCase());});
    animateNum('stat-kota',citySet.size);
    const negSet=new Set(['Indonesia']);
    rows.forEach(function(r){const c=r.c[2]&&r.c[2].v;if(c){const p=c.split(',');if(p.length>1)negSet.add(p[p.length-1].trim());}});
    animateNum('stat-negara',negSet.size);

    const scans=rows.filter(function(r){return r.c[2]&&r.c[2].v;});
    if(scans.length){
      const last=scans[scans.length-1];
      document.getElementById('ls-city').textContent=last.c[2].v.split(',')[0];
      document.getElementById('latest-spark').style.display='block';
    }

    buildMap(rows);
  }).catch(function(){document.getElementById('loading').style.display='none';});
});
</script>
