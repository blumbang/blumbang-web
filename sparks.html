  const m=document.getElementById('nav-mobile');

  m.classList.toggle('open');

function animateNum(elId,target){
  const el=document.getElementById(elId);
  if(!el) return;
  let cur=0;
  const step=Math.ceil(target/30)||1;
  const t=setInterval(function(){cur=Math.min(cur+step,target);el.textContent=cur;if(cur>=target)clearInterval(t);},40);
}
